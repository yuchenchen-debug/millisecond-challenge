<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>千分之一秒 — 你是前幾%？</title>
<meta name="description" content="只有 0.01% 的人能拿到 SSS 級。你的時間感有多精準？挑戰千分之一秒！">
<meta property="og:title" content="千分之一秒 — 你是前幾%？">
<meta property="og:description" content="只有 0.01% 的人能拿到 SSS 級。測試你的時間感極限！">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;
  --text:#e0e0e0;--dim:#666;--accent:#00f0ff;--accent2:#ff2d55;
  --gold:#ffd700;--green:#00ff88;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Noto Sans TC','JetBrains Mono',monospace;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}
.mono{font-family:'JetBrains Mono',monospace}

/* AD BANNER */
.ad-slot{
  position:fixed;bottom:0;left:0;right:0;
  height:60px;background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--dim);font-size:12px;z-index:100;
}

/* SCREENS */
.screen{
  display:none;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;
  width:100%;max-width:480px;padding:20px;
  padding-bottom:80px;
}
.screen.active{display:flex}

/* START */
#start-screen h1{
  font-size:clamp(2rem,8vw,3.5rem);font-weight:900;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:1.2;
}
#start-screen .subtitle{color:var(--dim);margin:12px 0 8px;font-size:14px}
#start-screen .hook{
  color:var(--accent2);font-weight:700;font-size:clamp(0.9rem,3.5vw,1.1rem);
  margin-bottom:32px;animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

.stats-bar{
  display:flex;gap:20px;margin:16px 0 24px;
}
.stat{text-align:center}
.stat-num{font-size:24px;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace}
.stat-label{font-size:11px;color:var(--dim);margin-top:2px}

.btn{
  padding:16px 48px;border:none;border-radius:50px;
  font-size:18px;font-weight:700;cursor:pointer;
  font-family:'Noto Sans TC',sans-serif;
  transition:transform .15s,box-shadow .15s;
}
.btn:active{transform:scale(.95)}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#0088ff);
  color:#000;box-shadow:0 0 30px rgba(0,240,255,.3);
}
.btn-primary:hover{box-shadow:0 0 40px rgba(0,240,255,.5)}
.btn-share{
  background:linear-gradient(135deg,var(--accent2),#ff6b00);
  color:#fff;box-shadow:0 0 30px rgba(255,45,85,.3);
}
.btn-secondary{
  background:transparent;color:var(--accent);
  border:2px solid var(--accent);padding:12px 36px;font-size:15px;
}

/* GAME */
#game-screen{position:relative}
.round-info{
  font-size:14px;color:var(--dim);margin-bottom:8px;
}
.round-info span{color:var(--accent);font-weight:700}
.target-label{
  font-size:16px;color:var(--text);margin-bottom:4px;
}
.target-time{
  font-size:clamp(1.5rem,6vw,2.2rem);font-weight:800;color:var(--gold);
  margin-bottom:16px;font-family:'JetBrains Mono',monospace;
}
.timer-display{
  font-size:clamp(4rem,18vw,7rem);font-weight:800;
  font-family:'JetBrains Mono',monospace;
  color:var(--accent);line-height:1;
  min-height:1.2em;
  text-shadow:0 0 40px rgba(0,240,255,.4);
  transition:color .2s;
}
.timer-display.stopped{color:var(--green)}
.timer-display.bad{color:var(--accent2)}

.tap-zone{
  width:100%;padding:40px 20px;margin:20px 0;
  border:2px dashed var(--border);border-radius:20px;
  cursor:pointer;transition:border-color .2s,background .2s;
}
.tap-zone:active{background:rgba(0,240,255,.05);border-color:var(--accent)}
.tap-hint{color:var(--dim);font-size:14px;margin-top:8px}

.round-result{
  font-size:18px;margin:12px 0;opacity:0;
  transition:opacity .3s;
}
.round-result.show{opacity:1}
.error-display{
  font-family:'JetBrains Mono',monospace;
  font-weight:700;font-size:24px;
}
.error-good{color:var(--green)}
.error-ok{color:var(--gold)}
.error-bad{color:var(--accent2)}

/* Progress dots */
.progress{display:flex;gap:8px;margin:16px 0}
.dot{
  width:12px;height:12px;border-radius:50%;
  background:var(--border);transition:background .3s;
}
.dot.done{background:var(--green)}
.dot.current{background:var(--accent);box-shadow:0 0 10px var(--accent)}
.dot.waiting{background:var(--border)}

/* RESULT */
#result-screen .rank{
  font-size:clamp(5rem,22vw,9rem);font-weight:900;
  line-height:1;margin:8px 0;
  font-family:'JetBrains Mono',monospace;
}
.rank-sss{background:linear-gradient(135deg,#ffd700,#ff6b00,#ff2d55,#ffd700);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:rainbow 2s linear infinite}
@keyframes rainbow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.rank-ss{color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,.5)}
.rank-s{color:#ff6b00;text-shadow:0 0 30px rgba(255,107,0,.4)}
.rank-a{color:var(--green);text-shadow:0 0 30px rgba(0,255,136,.4)}
.rank-b{color:var(--accent)}
.rank-c{color:var(--text)}
.rank-d{color:var(--dim)}
.rank-f{color:var(--accent2)}

.percentile{
  font-size:clamp(1rem,4vw,1.4rem);color:var(--dim);
  margin:4px 0 16px;
}
.percentile em{
  color:var(--accent2);font-style:normal;font-weight:700;
  font-size:clamp(1.2rem,5vw,1.8rem);
}
.total-error{
  font-family:'JetBrains Mono',monospace;
  font-size:20px;color:var(--text);margin-bottom:20px;
}
.round-summary{
  width:100%;max-width:360px;margin:0 auto 24px;
}
.round-row{
  display:flex;justify-content:space-between;
  padding:6px 0;border-bottom:1px solid var(--border);
  font-size:14px;font-family:'JetBrains Mono',monospace;
}
.round-row .label{color:var(--dim)}

.share-text{
  font-size:12px;color:var(--dim);margin-top:8px;
}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:16px}

.copied-toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:var(--green);color:#000;padding:10px 24px;
  border-radius:50px;font-weight:700;font-size:14px;
  opacity:0;transition:opacity .3s;z-index:200;
  pointer-events:none;
}
.copied-toast.show{opacity:1}

/* Difficulty pill */
.diff-pill{
  display:inline-block;padding:4px 12px;border-radius:50px;
  font-size:12px;font-weight:700;margin:4px 0 8px;
}
.diff-easy{background:rgba(0,255,136,.15);color:var(--green)}
.diff-medium{background:rgba(255,215,0,.15);color:var(--gold)}
.diff-hard{background:rgba(255,107,0,.15);color:#ff6b00}
.diff-extreme{background:rgba(255,45,85,.15);color:var(--accent2)}
.diff-impossible{background:rgba(255,45,85,.25);color:#ff0040;animation:pulse 1.5s infinite}
</style>
</head>
<body>

<div class="copied-toast" id="toast">已複製到剪貼簿！</div>

<!-- START SCREEN -->
<div class="screen active" id="start-screen">
  <h1>千分之一秒</h1>
  <p class="subtitle">測試你的時間感極限</p>
  <p class="hook">只有 0.01% 的人拿到 SSS 級</p>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="player-count">--</div>
      <div class="stat-label">累計挑戰人次</div>
    </div>
    <div class="stat">
      <div class="stat-num">0.01%</div>
      <div class="stat-label">SSS 通過率</div>
    </div>
  </div>
  <button class="btn btn-primary" onclick="startGame()">開始挑戰</button>
  <p style="color:var(--dim);font-size:12px;margin-top:20px">
    5 輪計時挑戰 — 在精確的秒數停下計時器
  </p>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="game-screen">
  <div class="round-info">第 <span id="round-num">1</span> / 5 輪</div>
  <div class="progress" id="progress"></div>
  <div id="diff-label" class="diff-pill diff-easy">簡單</div>
  <div class="target-label">目標時間</div>
  <div class="target-time" id="target-time">1.000s</div>
  <div class="timer-display mono" id="timer">0.000</div>
  <div class="tap-zone" id="tap-zone" ontouchstart="handleTap(event)" onmousedown="handleTap(event)">
    <div class="tap-hint" id="tap-hint">點擊開始計時</div>
  </div>
  <div class="round-result" id="round-result">
    <div>誤差</div>
    <div class="error-display" id="error-display">+0.000s</div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div class="screen" id="result-screen">
  <div style="font-size:14px;color:var(--dim)">你的等級</div>
  <div class="rank" id="rank">S</div>
  <div class="percentile">你超越了 <em id="percentile">99%</em> 的挑戰者</div>
  <div class="total-error">總誤差 <span id="total-error">0.000</span>s</div>
  <div class="round-summary" id="round-summary"></div>
  <button class="btn btn-share" onclick="shareResult()">分享成績挑戰朋友</button>
  <div class="btn-group">
    <button class="btn btn-secondary" onclick="startGame()">再挑戰一次</button>
  </div>
  <p class="share-text">點擊分享複製成績到剪貼簿</p>
</div>

<!-- AD SLOT -->
<div class="ad-slot" id="ad-slot">
  <!-- Replace with your AdSense code -->
  <span style="font-size:11px">廣告位 — 整合 AdSense 後替換</span>
</div>

<script>
const ROUNDS = [
  { target: 1.0,  label: '簡單',   cls: 'diff-easy' },
  { target: 2.0,  label: '普通',   cls: 'diff-medium' },
  { target: 3.0,  label: '困難',   cls: 'diff-hard' },
  { target: 5.0,  label: '極限',   cls: 'diff-extreme' },
  { target: 10.0, label: '不可能', cls: 'diff-impossible' },
];

const RANKS = [
  { max: 0.010, rank: 'SSS', cls: 'rank-sss', pct: 99.99 },
  { max: 0.030, rank: 'SS',  cls: 'rank-ss',  pct: 99.9 },
  { max: 0.050, rank: 'S',   cls: 'rank-s',   pct: 99 },
  { max: 0.100, rank: 'A',   cls: 'rank-a',   pct: 95 },
  { max: 0.200, rank: 'B',   cls: 'rank-b',   pct: 85 },
  { max: 0.500, rank: 'C',   cls: 'rank-c',   pct: 60 },
  { max: 1.000, rank: 'D',   cls: 'rank-d',   pct: 30 },
  { max: Infinity, rank: 'F', cls: 'rank-f',  pct: 0 },
];

let currentRound = 0;
let errors = [];
let timerStart = 0;
let timerRAF = 0;
let state = 'idle'; // idle | running | stopped

// Fake but believable player count
const baseCount = 847293;
const daysSincelaunch = Math.floor((Date.now() - new Date('2025-01-01').getTime()) / 86400000);
const fakeTotal = baseCount + daysSincelaunch * 1423 + Math.floor(Math.random() * 500);
document.getElementById('player-count').textContent = fakeTotal.toLocaleString();

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  currentRound = 0;
  errors = [];
  state = 'idle';
  setupRound();
  showScreen('game-screen');
}

function setupRound() {
  const r = ROUNDS[currentRound];
  document.getElementById('round-num').textContent = currentRound + 1;
  document.getElementById('target-time').textContent = r.target.toFixed(3) + 's';
  document.getElementById('timer').textContent = '0.000';
  document.getElementById('timer').className = 'timer-display mono';
  document.getElementById('tap-hint').textContent = '點擊開始計時';
  document.getElementById('round-result').classList.remove('show');

  const dl = document.getElementById('diff-label');
  dl.textContent = r.label;
  dl.className = 'diff-pill ' + r.cls;

  // Progress dots
  const prog = document.getElementById('progress');
  prog.innerHTML = ROUNDS.map((_, i) => {
    let cls = 'dot';
    if (i < currentRound) cls += ' done';
    else if (i === currentRound) cls += ' current';
    else cls += ' waiting';
    return `<div class="${cls}"></div>`;
  }).join('');

  state = 'idle';
}

function handleTap(e) {
  e.preventDefault();
  if (state === 'idle') {
    startTimer();
  } else if (state === 'running') {
    stopTimer();
  } else if (state === 'stopped') {
    nextRound();
  }
}

function startTimer() {
  state = 'running';
  timerStart = performance.now();
  document.getElementById('tap-hint').textContent = '點擊停止！';
  document.getElementById('round-result').classList.remove('show');
  updateTimer();
}

function updateTimer() {
  if (state !== 'running') return;
  const elapsed = (performance.now() - timerStart) / 1000;
  document.getElementById('timer').textContent = elapsed.toFixed(3);
  timerRAF = requestAnimationFrame(updateTimer);
}

function stopTimer() {
  cancelAnimationFrame(timerRAF);
  state = 'stopped';

  const elapsed = (performance.now() - timerStart) / 1000;
  const target = ROUNDS[currentRound].target;
  const error = Math.abs(elapsed - target);
  errors.push({ target, elapsed, error });

  const timerEl = document.getElementById('timer');
  timerEl.textContent = elapsed.toFixed(3);

  const errEl = document.getElementById('error-display');
  const sign = elapsed >= target ? '+' : '-';
  errEl.textContent = sign + error.toFixed(3) + 's';

  if (error < 0.015) {
    timerEl.classList.add('stopped');
    errEl.className = 'error-display error-good';
  } else if (error < 0.050) {
    timerEl.classList.add('stopped');
    errEl.className = 'error-display error-ok';
  } else {
    timerEl.classList.add('bad');
    errEl.className = 'error-display error-bad';
  }

  document.getElementById('round-result').classList.add('show');
  document.getElementById('tap-hint').textContent =
    currentRound < ROUNDS.length - 1 ? '點擊進入下一輪' : '點擊查看結果';
}

function nextRound() {
  currentRound++;
  if (currentRound >= ROUNDS.length) {
    showResult();
  } else {
    setupRound();
  }
}

function showResult() {
  const totalError = errors.reduce((s, e) => s + e.error, 0);
  const rankInfo = RANKS.find(r => totalError < r.max) || RANKS[RANKS.length - 1];

  const rankEl = document.getElementById('rank');
  rankEl.textContent = rankInfo.rank;
  rankEl.className = 'rank ' + rankInfo.cls;

  document.getElementById('percentile').textContent = rankInfo.pct + '%';
  document.getElementById('total-error').textContent = totalError.toFixed(3);

  // Round summary
  const summary = document.getElementById('round-summary');
  summary.innerHTML = errors.map((e, i) => {
    const sign = e.elapsed >= e.target ? '+' : '-';
    const cls = e.error < 0.015 ? 'error-good' : e.error < 0.05 ? 'error-ok' : 'error-bad';
    return `<div class="round-row">
      <span class="label">第${i+1}輪 (${e.target.toFixed(1)}s)</span>
      <span class="${cls}">${sign}${e.error.toFixed(3)}s</span>
    </div>`;
  }).join('') + `<div class="round-row" style="border:none;font-weight:700">
    <span>總誤差</span>
    <span>${totalError.toFixed(3)}s</span>
  </div>`;

  // Update fake player count
  const el = document.getElementById('player-count');
  el.textContent = (fakeTotal + Math.floor(Math.random() * 50)).toLocaleString();

  showScreen('result-screen');
}

function shareResult() {
  const totalError = errors.reduce((s, e) => s + e.error, 0);
  const rankInfo = RANKS.find(r => totalError < r.max) || RANKS[RANKS.length - 1];

  const lines = [
    `⏱ 千分之一秒 — ${rankInfo.rank} 級`,
    `總誤差 ${totalError.toFixed(3)}s｜超越 ${rankInfo.pct}% 的人`,
    '',
    ...errors.map((e, i) => {
      const sign = e.elapsed >= e.target ? '+' : '-';
      const icon = e.error < 0.015 ? '🎯' : e.error < 0.05 ? '✅' : '❌';
      return `${icon} ${e.target.toFixed(1)}s → ${sign}${e.error.toFixed(3)}s`;
    }),
    '',
    '你能超越我嗎？👇',
    location.href
  ];

  const text = lines.join('\n');

  if (navigator.share) {
    navigator.share({ title: '千分之一秒', text }).catch(() => copyFallback(text));
  } else {
    copyFallback(text);
  }
}

function copyFallback(text) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }).catch(() => {
    // Very old browser fallback
    prompt('複製以下文字分享：', text);
  });
}

// Prevent double-tap zoom on mobile
document.addEventListener('dblclick', e => e.preventDefault());

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    const gameScreen = document.getElementById('game-screen');
    if (gameScreen.classList.contains('active')) {
      handleTap(e);
    }
  }
});
</script>
</body>
</html>
